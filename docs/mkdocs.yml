# ============================================================
# MkDocs Configuration — Feest voor Anneke's 21e Verjaardag
# Doel: Publicatie informatie voor genodigden en organisatie
# ============================================================

# ------------------------------------------------------------
# 1. Site Identiteit
# ------------------------------------------------------------
site_name: "21-diner Anneke"
site_description: "Scandinavian Summer - 27 juni 2026"
site_author: "Familie Blok"
site_url: "https://hans-blok.github.io/anneke-21-diner/"

# ------------------------------------------------------------
# 2. Documentatie Bron
# ------------------------------------------------------------
docs_dir: "docs"
site_dir: "site"

# ------------------------------------------------------------
# 3. Theme & Presentatie
# Schone Scandinavische stijl, helder en uitnodigend
# ------------------------------------------------------------
theme:
  name: "material"
  language: "nl"
  features:
    - navigation.instant
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tabs
    - navigation.tabs.sticky
    - content.code.copy
    - content.code.annotate
    - toc.integrate
    - search.suggest
    - search.highlight
  palette:
    scheme: default
    primary: "green"
    accent: "amber"
  font:
    text: "Inter"
    code: "JetBrains Mono"
  logo: "assets/foto-scandanavian.jpg"
  favicon: "assets/foto-scandanavian.jpg"

# ------------------------------------------------------------
# 4. Custom Styling - 
# Eigendom: Presentatie Architect
# ------------------------------------------------------------
extra_css:
  - style/scandinavian.css

extra_javascript: []

# ------------------------------------------------------------
# 5. Plugins
# ------------------------------------------------------------
plugins:
  - search:
      lang: nl

# ------------------------------------------------------------
# 6. Markdown Extensies
# ------------------------------------------------------------
markdown_extensions:
  # Python Markdown
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3

  # Python Markdown Extensions
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

# ------------------------------------------------------------
# 7. Navigatiestructuur
# Primaire verantwoordelijkheid: Publicatie Steward
# ------------------------------------------------------------
nav:
  - Home: index.md
  - Dresscode: dresscode.md
  - Route & Vervoer: route-en-vervoer.md
  - Overnachten: overnachten.md
  - Acts: acts.md
  - Allergieën: allergieen.md
  - Nieuws: nieuws.md

  

# ------------------------------------------------------------
# 8. Extra Configuratie
# ------------------------------------------------------------
extra:
  social: []
  generator: false  # Verberg "Made with Material for MkDocs"

# ------------------------------------------------------------
# 9. Copyright
# ------------------------------------------------------------
copyright: "Scandinavian Summer 🌿 27 juni 2026"

