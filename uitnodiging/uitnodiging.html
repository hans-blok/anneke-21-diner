<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uitnodiging - Anneke's 21e Verjaardag</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Lato:wght@300;400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Lato', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .invitation {
            width: 100%;
            min-height: 100vh;
            background-image: url('../docs/assets/foto-scandanavian.jpg');
            background-size: cover;
            background-position: center top;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .content {
            background: white;
            border-radius: 20px;
            padding: 50px 45px;
            max-width: 460px;
            width: 100%;
            text-align: center;
            box-shadow: 0 15px 60px rgba(0, 0, 0, 0.25);
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .theme-badge {
            display: inline-block;
            background: linear-gradient(135deg, #9DC4AD 0%, #B5D5C0 100%);
            color: white;
            padding: 8px 20px;
            border-radius: 25px;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 24px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: #2c3e50;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .subtitle {
            font-size: 1.05rem;
            color: #7f8c8d;
            font-weight: 300;
            line-height: 1.6;
        }

        .divider {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, #C9A86C, #E8D4A8);
            margin: 28px auto;
        }

        .message {
            font-style: italic;
            color: #5a6c7d;
            line-height: 1.75;
            font-size: 0.95rem;
        }

        .rsvp {
            display: inline-block;
            margin-top: 32px;
            background: linear-gradient(135deg, #C9A86C 0%, #DFC08A 100%);
            color: white;
            padding: 14px 40px;
            border-radius: 30px;
            font-size: 0.95rem;
            letter-spacing: 1px;
            text-decoration: none;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .rsvp:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(201, 168, 108, 0.4);
        }

        .footer {
            margin-top: 28px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            color: #aab4bc;
            font-size: 0.85rem;
            line-height: 1.8;
        }
    </style>
</head>
<body>
    <div class="invitation">
        <div class="content">
            <span class="theme-badge">Scandinavian Summer</span>

            <h1>Anneke wordt 21!</h1>
            <p class="subtitle">Je bent van harte uitgenodigd voor het 21-jaarsdiner van Anneke!</p>

            <div class="divider"></div>

            <p class="message">
                We vieren deze bijzondere mijlpaal in Scandinavische zomerstijl.
                Denk aan lichte tinten, natuurlijke elementen en gezelligheid!
            </p>

            <a href="mailto:?subject=RSVP%20Anneke%2021e%20Verjaardag" class="rsvp">
                Bevestig je komst
            </a>

            <div class="footer">
                <p>Graag bevestigen voor 15 juni 2026</p>
                <p>Tot dan!</p>
            </div>
        </div>
    </div>
</body>
</html>
